name: Deploy To Vercel

on:
  push:
    paths:
      - Labs/**
      - mkdocs.yml

  workflow_dispatch:

jobs:
  deploy:
    name: Deploy To Vercel
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          submodules: recursive
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install uv
        run: pip install uv --break-system-packages 2>/dev/null || pip install uv

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Build Documentation
        run: bash .mkdocs-shared/init_site.sh --no-serve

      - name: Deploy to Vercel
        run: |
          npx vercel pull --yes --environment=production --token ${{ secrets.VERCEL_TOKEN }}
          npx vercel build --prod --token ${{ secrets.VERCEL_TOKEN }}
          npx vercel deploy --prebuilt --token ${{ secrets.VERCEL_TOKEN }} --prod
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

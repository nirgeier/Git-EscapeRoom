<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Git Escape Room</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/css/xterm.min.css">
  <style>
    *,
    *::before,
    *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg-deep: #0d1117;
      --bg-panel: #161b22;
      --bg-header: #010409;
      --accent: #f78166;
      --accent2: #58a6ff;
      --border: #30363d;
      --text: #c9d1d9;
      --text-dim: #8b949e;
      --handle-w: 6px;
    }

    html,
    body {
      height: 100%;
      overflow: hidden;
      background: var(--bg-deep);
      color: var(--text);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    /* ── Header ─────────────────────────────────────────── */
    #header {
      height: 48px;
      background: var(--bg-header);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 16px;
      gap: 16px;
      flex-shrink: 0;
      z-index: 10;
    }

    #header h1 {
      font-size: 1.1rem;
      color: var(--accent);
      white-space: nowrap;
      letter-spacing: 0.03em;
    }

    .spacer {
      flex: 1;
    }

    /* ── Progress bar ───────────────────────────────────── */
    #progress-wrap {
      display: flex;
      align-items: center;
      gap: 10px;
      flex: 1;
      min-width: 0;
    }

    #progress-label {
      font-size: 0.75rem;
      color: var(--text-dim);
      white-space: nowrap;
    }

    #progress-bar {
      flex: 1;
      height: 18px;
      background: var(--bg-deep);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      position: relative;
    }

    #progress-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #d29922, #e3b341);
      border-radius: 10px;
      transition: width 0.5s ease;
    }

    #progress-text {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.65rem;
      font-weight: 700;
      color: var(--text);
      text-shadow: 0 0 3px rgba(0, 0, 0, 0.6);
    }

    /* ── Status ─────────────────────────────────────────── */
    #status {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 0.8rem;
      color: var(--text-dim);
      white-space: nowrap;
    }

    #status-dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: var(--text-dim);
      transition: background 0.3s;
      flex-shrink: 0;
    }

    #status-dot.connected {
      background: #3fb950;
    }

    #status-dot.disconnected {
      background: var(--accent);
    }

    /* ── Main split layout ──────────────────────────────── */
    #main {
      display: flex;
      height: calc(100vh - 48px);
      overflow: hidden;
    }

    /* ── Docs pane ──────────────────────────────────────── */
    #docs-pane {
      width: 65%;
      min-width: 200px;
      display: flex;
      flex-direction: column;
      border-right: 1px solid var(--border);
      overflow: hidden;
      flex-shrink: 0;
    }

    #docs-pane-bar {
      height: 32px;
      background: var(--bg-panel);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 12px;
      gap: 8px;
      font-size: 0.75rem;
      color: var(--text-dim);
      flex-shrink: 0;
    }

    #docs-pane-bar svg {
      width: 14px;
      height: 14px;
      fill: var(--accent2);
      flex-shrink: 0;
    }

    #docs-frame {
      flex: 1;
      border: none;
      width: 100%;
      background: #fff;
    }

    /* ── Drag handle ────────────────────────────────────── */
    #drag-handle {
      width: var(--handle-w);
      background: var(--border);
      cursor: col-resize;
      flex-shrink: 0;
      position: relative;
      transition: background 0.15s;
      z-index: 5;
    }

    #drag-handle:hover,
    #drag-handle.dragging {
      background: var(--accent2);
    }

    #drag-handle::after {
      content: '';
      position: absolute;
      inset: 0 -4px;
    }

    /* ── Terminal pane ──────────────────────────────────── */
    #terminal-pane {
      flex: 1;
      min-width: 200px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #terminal-pane-bar {
      height: 32px;
      background: var(--bg-panel);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0;
      gap: 0;
      font-size: 0.75rem;
      color: var(--text-dim);
      flex-shrink: 0;
      overflow-x: auto;
    }

    #term-tabs {
      display: flex;
      align-items: center;
      height: 100%;
    }

    .term-tab {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 0 10px;
      height: 100%;
      cursor: pointer;
      border-right: 1px solid var(--border);
      white-space: nowrap;
      user-select: none;
      transition: background 0.15s;
    }

    .term-tab:hover {
      background: rgba(255, 255, 255, 0.04);
    }

    .term-tab.active {
      background: var(--bg-deep);
      color: var(--text);
    }

    .term-tab svg {
      width: 14px;
      height: 14px;
      fill: var(--accent);
      flex-shrink: 0;
    }

    .term-tab .close-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 16px;
      height: 16px;
      border-radius: 3px;
      font-size: 14px;
      line-height: 1;
      color: var(--text-dim);
      transition: background 0.15s, color 0.15s;
    }

    .term-tab .close-btn:hover {
      background: rgba(255, 255, 255, 0.1);
      color: var(--text);
    }

    #add-term-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 28px;
      height: 100%;
      cursor: pointer;
      color: var(--text-dim);
      font-size: 18px;
      flex-shrink: 0;
      transition: background 0.15s, color 0.15s;
      user-select: none;
    }

    #add-term-btn:hover {
      background: rgba(255, 255, 255, 0.06);
      color: var(--text);
    }

    #terminal-container {
      flex: 1;
      padding: 6px 8px;
      overflow: hidden;
      background: var(--bg-deep);
      position: relative;
    }

    #terminal-container .term-instance {
      position: absolute;
      inset: 6px 8px;
      display: none;
    }

    #terminal-container .term-instance.active {
      display: block;
    }

    #terminal-container .term-instance .xterm {
      height: 100%;
    }
  </style>
</head>

<body>

  <!-- ── Header ─────────────────────────────────────────── -->
  <div id="header">
    <h1>&#x1F511; Git Escape Room</h1>

    <div id="progress-wrap">
      <span id="progress-label">Room 1/50</span>
      <div id="progress-bar">
        <div id="progress-fill"></div>
        <div id="progress-text">2%</div>
      </div>
    </div>

    <div id="status">
      <div id="status-dot"></div>
      <span id="status-text">Connecting…</span>
    </div>
  </div>

  <!-- ── Main ──────────────────────────────────────────– -->
  <div id="main">

    <!-- Left: Docs pane -->
    <div id="docs-pane">
      <div id="docs-pane-bar">
        <svg viewBox="0 0 24 24">
          <path
            d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8l-6-6zm-1 1.5L18.5 9H13V3.5zM6 20V4h5v7h7v9H6z" />
        </svg>
        <span>Documentation</span>
      </div>
      <iframe id="docs-frame" src="about:blank" sandbox="allow-scripts allow-same-origin allow-forms allow-popups"
        title="Documentation"></iframe>
    </div>

    <!-- Drag handle -->
    <div id="drag-handle"></div>

    <!-- Right: Terminal pane -->
    <div id="terminal-pane">
      <div id="terminal-pane-bar">
        <div id="term-tabs"></div>
        <div id="add-term-btn" title="New Terminal">+</div>
      </div>
      <div id="terminal-container"></div>
    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/lib/xterm.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.10.0/lib/addon-fit.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-web-links@0.11.0/lib/addon-web-links.min.js"></script>
  <script>
    (function () {

      /* ── Docs frame ──────────────────────────────────────── */
      const docsFrame = document.getElementById('docs-frame');

      const DEFAULT_DOCS_URL = '/docs/';
      const FALLBACK_DOCS_URL = 'https://nirgeier.github.io/Git-EscapeRoom/';

      fetch(DEFAULT_DOCS_URL, { method: 'HEAD' })
        .then(r => { docsFrame.src = r.ok ? DEFAULT_DOCS_URL : FALLBACK_DOCS_URL; })
        .catch(() => { docsFrame.src = FALLBACK_DOCS_URL; });

      /* ── Resizable split ─────────────────────────────────── */
      const mainEl = document.getElementById('main');
      const docsPane = document.getElementById('docs-pane');
      const handle = document.getElementById('drag-handle');
      let dragging = false;
      let startX, startW;

      handle.addEventListener('mousedown', e => {
        dragging = true;
        startX = e.clientX;
        startW = docsPane.getBoundingClientRect().width;
        handle.classList.add('dragging');
        document.body.style.cursor = 'col-resize';
        document.body.style.userSelect = 'none';
        docsFrame.style.pointerEvents = 'none';
      });

      document.addEventListener('mousemove', e => {
        if (!dragging) return;
        const totalW = mainEl.getBoundingClientRect().width;
        const newW = Math.max(200, Math.min(startW + (e.clientX - startX), totalW - 200));
        docsPane.style.width = newW + 'px';
        fitTerminal();
      });

      document.addEventListener('mouseup', () => {
        if (!dragging) return;
        dragging = false;
        handle.classList.remove('dragging');
        document.body.style.cursor = '';
        document.body.style.userSelect = '';
        docsFrame.style.pointerEvents = '';
        fitTerminal();
      });

      /* ── Progress bar tracking ──────────────────────────────── */
      const TOTAL_ROOMS = 50;
      const progressFill = document.getElementById('progress-fill');
      const progressText = document.getElementById('progress-text');
      const progressLabel = document.getElementById('progress-label');
      let currentRoom = 1;

      let pendingPassword = null;

      function updateProgress(roomNum) {
        if (roomNum < 1 || roomNum > TOTAL_ROOMS || roomNum === currentRoom) return;
        currentRoom = roomNum;
        const pct = Math.round((roomNum / TOTAL_ROOMS) * 100);
        progressFill.style.width = pct + '%';
        progressText.textContent = pct + '%';
        progressLabel.textContent = 'Room ' + roomNum + '/' + TOTAL_ROOMS;
        // Navigate docs panel to the new room
        const pad = String(roomNum).padStart(2, '0');
        docsFrame.src = '/docs/rooms/room_' + pad + '/Room-' + pad + '/';
      }

      // Auto-fill password in the docs iframe after it loads
      docsFrame.addEventListener('load', () => {
        if (!pendingPassword) return;
        try {
          const iframeDoc = docsFrame.contentDocument || docsFrame.contentWindow.document;
          const pwdInput = iframeDoc.getElementById('mkdocs-content-password');
          const decryptBtn = iframeDoc.getElementById('mkdocs-decrypt-button');
          if (pwdInput && decryptBtn) {
            pwdInput.value = pendingPassword;
            decryptBtn.click();
          }
        } catch (e) { /* cross-origin or not ready */ }
        pendingPassword = null;
      });

      // Parse terminal output to detect room changes
      function detectRoom(data) {
        // Capture hidden unlock marker: \033]1337;UnlockRoom=NN:password\007
        const unlock = data.match(/\]1337;UnlockRoom=(\d+):([^\x07]+)\x07/);
        if (unlock) {
          pendingPassword = unlock[2];
        }
        const moved = data.match(/Moved to Room\s+(\d+)/i);
        if (moved) { updateProgress(parseInt(moved[1], 10)); return; }
        const prompt = data.match(/room_(\d+)/);
        if (prompt) { updateProgress(parseInt(prompt[1], 10)); }
      }

      /* ── Multi-terminal state ─────────────────────────────── */
      const termContainer = document.getElementById('terminal-container');
      const termTabsEl = document.getElementById('term-tabs');
      const addTermBtn = document.getElementById('add-term-btn');
      const statusDot = document.getElementById('status-dot');
      const statusText = document.getElementById('status-text');

      const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
      const wsUrl = protocol + '//' + location.host;

      const TERM_THEME = {
        background: '#0d1117',
        foreground: '#c9d1d9',
        cursor: '#f78166',
        selectionBackground: '#30363d',
        black: '#0d1117',
        red: '#f85149',
        green: '#3fb950',
        yellow: '#d29922',
        blue: '#58a6ff',
        magenta: '#bc8cff',
        cyan: '#39d2c0',
        white: '#c9d1d9',
        brightBlack: '#484f58',
        brightRed: '#ff7b72',
        brightGreen: '#56d364',
        brightYellow: '#e3b341',
        brightBlue: '#79c0ff',
        brightMagenta: '#d2a8ff',
        brightCyan: '#56d4dd',
        brightWhite: '#f0f6fc',
      };

      const terminals = [];   // { id, term, fitAddon, ws, el, tabEl, alive }
      let nextId = 1;
      let activeId = null;

      function setStatus(connected) {
        statusDot.className = 'dot ' + (connected ? 'connected' : 'disconnected');
        statusText.textContent = connected ? 'Connected' : 'Disconnected';
      }

      function updateStatus() {
        const anyAlive = terminals.some(t => t.ws && t.ws.readyState === WebSocket.OPEN);
        setStatus(anyAlive);
      }

      function fitTerminal() {
        const t = terminals.find(t => t.id === activeId);
        if (t) requestAnimationFrame(() => t.fitAddon.fit());
      }

      function renderTabs() {
        termTabsEl.innerHTML = '';
        terminals.forEach(t => {
          const tab = document.createElement('div');
          tab.className = 'term-tab' + (t.id === activeId ? ' active' : '');
          tab.innerHTML = '<svg viewBox="0 0 24 24"><path d="M20 3H4a1 1 0 0 0-1 1v16a1 1 0 0 0 1 1h16a1 1 0 0 0 1-1V4a1 1 0 0 0-1-1zm-1 16H5V5h14v14zM7.293 15.293l1.414 1.414L13.414 12l-4.707-4.707-1.414 1.414L10.586 12l-3.293 3.293z"/></svg>'
            + '<span>Terminal ' + t.id + '</span>';

          if (terminals.length > 1) {
            const closeBtn = document.createElement('span');
            closeBtn.className = 'close-btn';
            closeBtn.textContent = '\u00d7';
            closeBtn.title = 'Close terminal';
            closeBtn.addEventListener('click', e => { e.stopPropagation(); closeTerminal(t.id); });
            tab.appendChild(closeBtn);
          }

          tab.addEventListener('click', () => activateTerminal(t.id));
          termTabsEl.appendChild(tab);
          t.tabEl = tab;
        });
      }

      function activateTerminal(id) {
        activeId = id;
        terminals.forEach(t => {
          t.el.classList.toggle('active', t.id === id);
        });
        renderTabs();
        fitTerminal();
        const t = terminals.find(t => t.id === id);
        if (t) t.term.focus();
      }

      function connectTerminal(t) {
        const ws = new WebSocket(wsUrl);
        t.ws = ws;

        ws.onopen = () => {
          updateStatus();
          ws.send(JSON.stringify({ type: 'resize', cols: t.term.cols, rows: t.term.rows }));
        };

        ws.onmessage = (event) => {
          try {
            const msg = JSON.parse(event.data);
            if (msg.type === 'output') { t.term.write(msg.data); detectRoom(msg.data); }
            if (msg.type === 'exit') {
              t.term.writeln('\r\n\x1b[31m[Session ended]\x1b[0m');
              t.alive = false;
              updateStatus();
            }
          } catch (e) { /* ignore */ }
        };

        ws.onclose = () => {
          t.alive = false;
          updateStatus();
          t.term.writeln('\r\n\x1b[33m[Connection lost - reconnecting in 3s…]\x1b[0m');
          setTimeout(() => { if (terminals.includes(t)) connectTerminal(t); }, 3000);
        };

        ws.onerror = () => { updateStatus(); };
      }

      function createTerminal() {
        const id = nextId++;
        const el = document.createElement('div');
        el.className = 'term-instance';
        termContainer.appendChild(el);

        const term = new Terminal({
          cursorBlink: true,
          fontSize: 14,
          fontFamily: '"Cascadia Code", "Fira Code", "JetBrains Mono", Menlo, Monaco, monospace',
          theme: TERM_THEME,
          allowProposedApi: true,
          scrollback: 5000,
        });

        const fitAddon = new FitAddon.FitAddon();
        const webLinksAddon = new WebLinksAddon.WebLinksAddon();
        term.loadAddon(fitAddon);
        term.loadAddon(webLinksAddon);
        term.open(el);

        const t = { id, term, fitAddon, ws: null, el, tabEl: null, alive: true };

        term.onData(data => {
          if (t.ws && t.ws.readyState === WebSocket.OPEN)
            t.ws.send(JSON.stringify({ type: 'input', data }));
        });

        term.onResize(size => {
          if (t.ws && t.ws.readyState === WebSocket.OPEN)
            t.ws.send(JSON.stringify({ type: 'resize', cols: size.cols, rows: size.rows }));
        });

        terminals.push(t);
        connectTerminal(t);
        activateTerminal(id);
        return t;
      }

      function closeTerminal(id) {
        const idx = terminals.findIndex(t => t.id === id);
        if (idx === -1 || terminals.length <= 1) return;
        const t = terminals[idx];
        if (t.ws) t.ws.close();
        t.term.dispose();
        t.el.remove();
        terminals.splice(idx, 1);
        if (activeId === id) {
          const newIdx = Math.min(idx, terminals.length - 1);
          activateTerminal(terminals[newIdx].id);
        } else {
          renderTabs();
        }
        updateStatus();
      }

      addTermBtn.addEventListener('click', () => createTerminal());
      window.addEventListener('resize', fitTerminal);

      // Create the first terminal
      createTerminal();

    })();
  </script>
</body>

</html>
